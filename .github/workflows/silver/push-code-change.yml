name: push-code-change
description: Generate a commit message from staged changes and push to the detected Git platform.

steps:

  # ── Step 1: Generate commit message using git-commit-message skill ──────────
  - id: create-commit-msg
    type: skill
    description: Generate commit message using git-commit-message skill
    skill: git-commit-message
    argument: staged
    output: commit_message
    on_fail: abort

  # ── Step 2: Commit ─────────────────────────────────────────────────────────
  - id: git-commit
    type: shell
    description: Stage all and commit
    command: "git commit -am \"{{commit_message}}\""
    condition: "steps.create-commit-msg.passed"
    on_fail: abort

  # ── Step 3: Push (platform auto-detected: Gerrit/GitHub/GitLab/Bitbucket) ──
  - id: git-push
    type: shell
    description: "Push to remote (auto-detected: {{git_platform}})"
    command: "{{git_push_cmd}}"
    condition: "steps.git-commit.passed"
    on_fail: abort
